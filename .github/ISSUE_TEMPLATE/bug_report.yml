name: Bug report
description: Report a problem with the cadenalabs.io site or this repository.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do not include
        secrets, API keys, customer data, or proof-of-concept exploit code.
        For security vulnerabilities, use private reporting instead — see
        `SECURITY.md`.
  - type: input
    id: page
    attributes:
      label: Page or route
      description: The URL or route where you saw the problem (for example `/services/networking`).
      placeholder: https://cadenalabs.io/...
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include reproduction steps if possible.
      placeholder: |
        1. Visit ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser and OS
      description: Browser, version, and operating system.
      placeholder: e.g. Safari 18.4 on macOS 15.3
    validations:
      required: false
