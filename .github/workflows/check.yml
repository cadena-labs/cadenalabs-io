name: Check

on:
  pull_request:
  push:
    branches:
      - main

# CI runs on every push or PR. Placeholder values satisfy build-time secret
# assertions only; never add real secrets or OP_* credentials here.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, build, lint, and audit
    runs-on: ubuntu-latest
    env:
      CONTACT_EMAIL: ci@example.com
      RESEND_API_KEY: ci
      RESEND_FROM_EMAIL: ci-from@example.com
      RESEND_FROM_NAME: CI Sender
      TURNSTILE_SECRET_KEY: ci
      TURNSTILE_SITE_KEY: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run project checks
        run: pnpm run check
