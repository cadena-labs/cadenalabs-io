name: Check

on:
  pull_request:
  push:
    branches:
      - main

# CI runs on every push or PR. Only real values are placeholder strings; never
# add real secrets here — untrusted branch builds must not receive them.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, build, lint, and audit
    runs-on: ubuntu-latest
    env:
      CONTACT_EMAIL: ci@example.com
      RESEND_API_KEY: ci
      RESEND_FROM_EMAIL: ci-from@example.com
      RESEND_FROM_NAME: CI Sender
      TURNSTILE_SECRET_KEY: ci
      TURNSTILE_SITE_KEY: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run project checks
        run: pnpm run check
